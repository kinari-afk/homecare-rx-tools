<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お薬計算ツール</title>
  
  <!-- デザインを整えるためのTailwind CSSを読み込み -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React本体と、ブラウザ上でコードを動かすためのBabelを読み込み -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans pb-12">
  
  <!-- アプリが表示される場所 -->
  <div id="root"></div>

  <!-- ここから下がアプリのプログラム（React） -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- アイコン部品（インラインSVG） ---
    const CalendarIcon = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>;
    const Building2 = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h4"/></svg>;
    const CalendarDays = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/><path d="M8 18h.01"/><path d="M12 18h.01"/><path d="M16 18h.01"/></svg>;
    const Plus = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5 12h14"/><path d="M12 5v14"/></svg>;
    const Minus = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="5" x2="19" y1="12" y2="12"/></svg>;
    const Trash2 = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>;
    const Activity = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>;
    const Info = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>;
    const Clock = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
    const Copy = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>;
    const Check = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"/></svg>;

    // ユーティリティ関数：今日の日付を YYYY-MM-DD 形式で取得
    const getTodayStr = () => {
      const today = new Date();
      const yyyy = today.getFullYear();
      const mm = String(today.getMonth() + 1).padStart(2, '0');
      const dd = String(today.getDate()).padStart(2, '0');
      return `${yyyy}-${mm}-${dd}`;
    };

    // ユーティリティ関数：日付文字列を日本語表記にフォーマット (画面表示用)
    const formatDateJP = (dateString) => {
      if (!dateString) return '';
      const date = new Date(dateString);
      if (isNaN(date.getTime())) return '';
      
      const days = ['日', '月', '火', '水', '木', '金', '土'];
      return `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日 (${days[date.getDay()]})`;
    };

    // ユーティリティ関数：コピー用のシンプルな日付フォーマット (例: 2026/7/4)
    const formatShortDate = (dateString) => {
      if (!dateString) return '';
      const date = new Date(dateString);
      if (isNaN(date.getTime())) return '';
      return `${date.getFullYear()}/${date.getMonth() + 1}/${date.getDate()}`;
    };

    // 飲むタイミングのマスターデータ
    const TIMING_OPTIONS = [
      { id: 'morning', label: '朝' },
      { id: 'noon', label: '昼' },
      { id: 'evening', label: '夕' },
      { id: 'night', label: '就寝前' }
    ];
    const getTimingLabel = (id) => TIMING_OPTIONS.find(o => o.id === id)?.label || '';

    function App() {
      const [hospitalName, setHospitalName] = useState('');
      const [startDate, setStartDate] = useState(getTodayStr());
      
      // 服用タイミング関連のステート
      const [timings, setTimings] = useState([]);
      const [startTiming, setStartTiming] = useState('');
      const [endTiming, setEndTiming] = useState('');

      const [days, setDays] = useState(14);
      const [endDate, setEndDate] = useState('');
      const [records, setRecords] = useState([]);
      const [isCopied, setIsCopied] = useState(false);

      // 飲むタイミングの選択トグル
      const toggleTiming = (optId) => {
        setTimings(prev => {
          if (prev.includes(optId)) {
            return prev.filter(t => t !== optId);
          } else {
            const next = [...prev, optId];
            return TIMING_OPTIONS.map(o => o.id).filter(t => next.includes(t));
          }
        });
      };

      // 入力値が変わるたびに終了日を自動計算
      useEffect(() => {
        if (startDate && days > 0) {
          const start = new Date(startDate);
          
          if (timings.length > 0) {
            // タイミングが選ばれている場合の詳細計算
            if (!startTiming || !timings.includes(startTiming)) {
              setStartTiming(timings[0]); // デフォルトを設定して次回のレンダリングで計算
              return;
            }

            const totalDoses = days * timings.length;
            const startIndex = timings.indexOf(startTiming);
            const firstDayDoses = timings.length - startIndex;
            
            let endObj = new Date(startDate);
            let calcEndTiming = '';

            if (totalDoses <= firstDayDoses) {
              // 1日目で飲み終わる場合
              calcEndTiming = timings[startIndex + totalDoses - 1];
            } else {
              // 2日目以降まで続く場合
              const remainingDoses = totalDoses - firstDayDoses;
              const fullDays = Math.floor(remainingDoses / timings.length);
              const remainder = remainingDoses % timings.length;
              
              if (remainder === 0) {
                endObj.setDate(endObj.getDate() + 1 + fullDays - 1);
                calcEndTiming = timings[timings.length - 1];
              } else {
                endObj.setDate(endObj.getDate() + 1 + fullDays);
                calcEndTiming = timings[remainder - 1];
              }
            }
            
            const yyyy = endObj.getFullYear();
            const mm = String(endObj.getMonth() + 1).padStart(2, '0');
            const dd = String(endObj.getDate()).padStart(2, '0');
            setEndDate(`${yyyy}-${mm}-${dd}`);
            setEndTiming(calcEndTiming);

          } else {
            // タイミング未選択の場合は、従来通りの日数計算のみ
            start.setDate(start.getDate() + parseInt(days, 10) - 1);
            const yyyy = start.getFullYear();
            const mm = String(start.getMonth() + 1).padStart(2, '0');
            const dd = String(start.getDate()).padStart(2, '0');
            setEndDate(`${yyyy}-${mm}-${dd}`);
            setEndTiming('');
          }
        } else {
          setEndDate('');
          setEndTiming('');
        }
      }, [startDate, days, timings, startTiming]);

      // 計算結果を履歴に保存
      const handleSave = () => {
        if (!startDate || days <= 0 || !endDate) return;

        const newRecord = {
          id: Date.now().toString(),
          name: hospitalName.trim() || '病院名未入力',
          startDate,
          days,
          endDate,
          startTiming,
          endTiming,
          timings
        };

        setRecords([newRecord, ...records]);
        setHospitalName('');
      };

      // 履歴の削除
      const handleDelete = (id) => {
        setRecords(records.filter(record => record.id !== id));
      };

      // 記録用のテキストを一括コピー
      const handleCopyText = async () => {
        if (records.length === 0) return;

        let copyText = "【処方薬の終了日確認】\n";
        records.forEach(record => {
          const hName = record.name;
          const sDate = formatShortDate(record.startDate);
          const eDate = formatShortDate(record.endDate);
          const sTimeStr = record.startTiming ? ` ${getTimingLabel(record.startTiming)}` : '';
          const eTimeStr = record.endTiming ? ` ${getTimingLabel(record.endTiming)}` : '';
          
          copyText += `・${hName}からの処方 (${record.days}日分)： ${sDate}${sTimeStr}開始 → ${eDate}${eTimeStr}まで\n`;
        });

        try {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(copyText);
          } else {
            const textArea = document.createElement("textarea");
            textArea.value = copyText;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand("copy");
            document.body.removeChild(textArea);
          }
          setIsCopied(true);
          setTimeout(() => setIsCopied(false), 2000);
        } catch (err) {
          console.error('コピーに失敗しました', err);
          alert('コピーに失敗しました。');
        }
      };

      // 残り日数の計算（今日を基準に）
      const calculateRemainingDays = (end) => {
        const today = new Date(getTodayStr());
        const endDateObj = new Date(end);
        const diffTime = endDateObj - today;
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        
        if (diffDays < 0) return '服用終了';
        if (diffDays === 0) return '今日まで';
        return `あと ${diffDays} 日`;
      };

      return (
        <div>
          <header className="bg-teal-600 text-white p-4 shadow-md sticky top-0 z-10">
            <div className="max-w-md mx-auto flex items-center justify-center gap-2">
              <Activity size={24} />
              <h1 className="text-xl font-bold tracking-wider">処方日数・終了日計算</h1>
            </div>
          </header>

          <main className="max-w-md mx-auto p-4 space-y-6 mt-4">
            
            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
              <div className="bg-teal-50 p-4 border-b border-teal-100 flex items-center gap-2 text-teal-800">
                <Activity size={20} />
                <h2 className="font-semibold">いつまであるか計算</h2>
              </div>
              
              <div className="p-5 space-y-6">
                
                {/* 病院名 */}
                <div className="space-y-1">
                  <label className="block text-sm font-medium text-slate-600">病院・医療機関名 (任意)</label>
                  <div className="flex items-center relative">
                    <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                      <Building2 size={18} />
                    </div>
                    <input
                      type="text"
                      value={hospitalName}
                      onChange={(e) => setHospitalName(e.target.value)}
                      placeholder="例: A病院、近所のクリニック"
                      className="flex-1 w-full pl-10 pr-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500 transition-colors text-base"
                    />
                  </div>
                </div>

                {/* 開始日 */}
                <div className="space-y-1">
                  <label className="block text-sm font-medium text-slate-600">内服を開始する日</label>
                  <div className="flex items-center relative">
                    <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                      <CalendarIcon size={18} />
                    </div>
                    <input
                      type="date"
                      value={startDate}
                      onChange={(e) => setStartDate(e.target.value)}
                      className="flex-1 w-full pl-10 pr-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500 transition-colors text-base"
                    />
                  </div>
                </div>

                {/* 飲むタイミング (New) */}
                <div className="space-y-2 pt-2 border-t border-slate-100">
                  <label className="block text-sm font-medium text-slate-600">飲むタイミング (任意・複数可)</label>
                  <div className="flex flex-wrap gap-2">
                    {TIMING_OPTIONS.map(opt => (
                      <button
                        key={opt.id}
                        type="button"
                        onClick={() => toggleTiming(opt.id)}
                        className={`px-4 py-2 rounded-full text-sm font-bold transition-all border ${
                          timings.includes(opt.id)
                            ? 'bg-teal-100 text-teal-800 border-teal-300 shadow-sm'
                            : 'bg-white text-slate-500 border-slate-300 hover:bg-slate-50'
                        }`}
                      >
                        {opt.label}
                      </button>
                    ))}
                  </div>
                </div>

                {/* 飲み始めるタイミング (New) */}
                {timings.length > 0 && (
                  <div className="space-y-2 pb-1">
                    <label className="block text-sm font-medium text-slate-600">飲み始めるタイミング</label>
                    <div className="flex flex-wrap gap-2">
                      {timings.map(tId => (
                        <button
                          key={tId}
                          type="button"
                          onClick={() => setStartTiming(tId)}
                          className={`px-4 py-2 rounded-full text-sm font-bold transition-all border ${
                            startTiming === tId
                              ? 'bg-orange-100 text-orange-800 border-orange-300 shadow-sm'
                              : 'bg-white text-slate-500 border-slate-300 hover:bg-slate-50'
                          }`}
                        >
                          {getTimingLabel(tId)}から
                        </button>
                      ))}
                    </div>
                  </div>
                )}

                {/* 処方日数 (ボタン付きに改善) */}
                <div className="space-y-1">
                  <label className="block text-sm font-medium text-slate-600">処方日数 (何日分か)</label>
                  <div className="flex flex-col gap-3">
                    
                    <div className="flex items-center gap-2">
                      <button 
                        type="button"
                        onClick={() => setDays(d => Math.max(1, (parseInt(d)||1) - 1))}
                        className="w-12 h-12 flex items-center justify-center bg-slate-50 hover:bg-slate-100 text-teal-600 border border-slate-200 rounded-xl transition-colors active:scale-95 flex-shrink-0"
                      >
                        <Minus size={24} />
                      </button>
                      
                      <div className="relative flex-1">
                        <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                          <CalendarDays size={18} />
                        </div>
                        <input
                          type="number"
                          min="1"
                          value={days}
                          onChange={(e) => setDays(parseInt(e.target.value) || '')}
                          className="w-full pl-10 pr-8 py-3 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500 transition-colors text-xl font-bold text-center"
                        />
                        <div className="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none text-slate-500 font-medium">
                          日分
                        </div>
                      </div>
                      
                      <button 
                        type="button"
                        onClick={() => setDays(d => (parseInt(d)||0) + 1)}
                        className="w-12 h-12 flex items-center justify-center bg-slate-50 hover:bg-slate-100 text-teal-600 border border-slate-200 rounded-xl transition-colors active:scale-95 flex-shrink-0"
                      >
                        <Plus size={24} />
                      </button>
                    </div>

                    <div className="flex gap-2 justify-end">
                      {[14, 28, 30].map(d => (
                        <button
                          key={d}
                          type="button"
                          onClick={() => setDays(d)}
                          className="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm rounded-lg transition-colors border border-slate-200 font-medium"
                        >
                          {d}日
                        </button>
                      ))}
                    </div>
                  </div>
                </div>

                {/* 計算結果 */}
                <div className="mt-6 p-4 bg-gradient-to-br from-teal-500 to-teal-600 rounded-xl text-white shadow-inner">
                  <p className="text-teal-100 text-sm mb-1 flex items-center gap-1">
                    <Info size={14} />
                    内服終了日（この日までお薬があります）
                  </p>
                  <div className="text-2xl font-bold text-center py-2 flex flex-col items-center justify-center gap-1">
                    {endDate ? (
                      <>
                        <span>{formatDateJP(endDate)}</span>
                        {endTiming && (
                          <span className="text-xl bg-teal-700/50 px-3 py-1 rounded-full text-teal-50">
                            {getTimingLabel(endTiming)} まで
                          </span>
                        )}
                      </>
                    ) : '---'}
                  </div>
                  {endDate && startDate && days > 0 && (
                    <p className="text-center text-teal-100 text-sm mt-2 opacity-90">
                      ({formatDateJP(startDate)} {startTiming ? getTimingLabel(startTiming) + 'から' : ''} {days} 日間)
                    </p>
                  )}
                </div>

                <button
                  onClick={handleSave}
                  disabled={!endDate}
                  className="w-full py-4 bg-teal-600 hover:bg-teal-700 disabled:bg-slate-300 disabled:cursor-not-allowed text-white font-semibold rounded-xl shadow-sm transition-all flex items-center justify-center gap-2 active:scale-95 text-lg"
                >
                  <Plus size={22} />
                  計算結果をリストに追加
                </button>
              </div>
            </div>

            {records.length > 0 && (
              <div className="space-y-4">
                <div className="flex items-center justify-between px-1">
                  <h3 className="font-semibold text-slate-700 flex items-center gap-2">
                    <Clock size={18} />
                    保存した記録
                  </h3>
                  
                  <button
                    onClick={handleCopyText}
                    className={`flex items-center gap-1 px-3 py-1.5 rounded-full text-sm font-medium transition-colors ${
                      isCopied 
                        ? 'bg-green-100 text-green-700 border border-green-200' 
                        : 'bg-white text-slate-600 border border-slate-300 hover:bg-slate-50'
                    }`}
                  >
                    {isCopied ? (
                      <>
                        <Check size={16} /> コピーしました
                      </>
                    ) : (
                      <>
                        <Copy size={16} /> 記録をテキストでコピー
                      </>
                    )}
                  </button>
                </div>
                
                <div className="space-y-3">
                  {records.map((record) => {
                    const remaining = calculateRemainingDays(record.endDate);
                    const isFinished = remaining === '服用終了';

                    return (
                      <div 
                        key={record.id} 
                        className={`bg-white p-4 rounded-xl shadow-sm border ${isFinished ? 'border-slate-200 opacity-60' : 'border-teal-100'} relative overflow-hidden`}
                      >
                        {!isFinished && (
                          <div className="absolute top-0 right-0 bg-orange-100 text-orange-800 text-xs font-bold px-3 py-1 rounded-bl-lg">
                            {remaining}
                          </div>
                        )}

                        <div className="flex justify-between items-start mb-2 pr-16">
                          <h4 className="font-bold text-lg text-slate-800 flex items-center gap-2">
                            <Building2 size={16} className="text-teal-600" />
                            <span className="line-clamp-1">{record.name}</span>
                          </h4>
                        </div>
                        
                        <div className="grid grid-cols-2 gap-2 text-sm text-slate-600 mb-3">
                          <div>
                            <span className="text-slate-400 text-xs block mb-0.5">開始日</span>
                            <div className="flex flex-wrap items-center gap-1">
                              {formatDateJP(record.startDate)}
                              {record.startTiming && (
                                <span className="text-xs font-bold px-1.5 py-0.5 bg-orange-50 text-orange-700 border border-orange-100 rounded">
                                  {getTimingLabel(record.startTiming)}
                                </span>
                              )}
                            </div>
                          </div>
                          <div>
                            <span className="text-slate-400 text-xs block mb-0.5">処方日数</span>
                            {record.days} 日分
                          </div>
                        </div>
                        
                        <div className="bg-slate-50 p-2 rounded-lg border border-slate-100 flex items-center justify-between">
                          <div>
                            <span className="text-slate-400 text-xs block mb-0.5">終了日 (ここまで)</span>
                            <div className={`font-semibold flex items-center gap-1.5 ${isFinished ? 'text-slate-500' : 'text-teal-700'}`}>
                              {formatDateJP(record.endDate)}
                              {record.endTiming && (
                                <span className={`text-xs px-1.5 py-0.5 border rounded ${isFinished ? 'bg-slate-100 border-slate-200' : 'bg-teal-50 border-teal-200'}`}>
                                  {getTimingLabel(record.endTiming)}まで
                                </span>
                              )}
                            </div>
                          </div>
                          <button
                            onClick={() => handleDelete(record.id)}
                            className="p-2 text-slate-400 hover:text-red-500 transition-colors rounded-full hover:bg-red-50"
                            title="削除"
                          >
                            <Trash2 size={18} />
                          </button>
                        </div>
                      </div>
                    );
                  })}
                </div>
                
                <div className="bg-slate-100 border border-slate-200 rounded-lg p-3 text-xs text-slate-500 mt-2">
                  <p className="font-semibold mb-1">【コピーされる文章のプレビュー】</p>
                  <div className="whitespace-pre-wrap font-mono">
                    【処方薬の終了日確認】{'\n'}
                    {records.map(record => {
                      const sTimeStr = record.startTiming ? ` ${getTimingLabel(record.startTiming)}` : '';
                      const eTimeStr = record.endTiming ? ` ${getTimingLabel(record.endTiming)}` : '';
                      return `・${record.name}からの処方 (${record.days}日分)： ${formatShortDate(record.startDate)}${sTimeStr}開始 → ${formatShortDate(record.endDate)}${eTimeStr}まで\n`;
                    })}
                  </div>
                </div>

              </div>
            )}
          </main>
        </div>
      );
    }

    // 画面に表示する処理
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
